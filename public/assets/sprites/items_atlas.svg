<svg xmlns="http://www.w3.org/2000/svg" width="512" height="256" viewBox="0 0 512 256">
  <defs>
    <linearGradient id="metal" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#3b4150"/>
      <stop offset="1" stop-color="#1f2533"/>
    </linearGradient>
    <linearGradient id="chrome" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#c4d1e8"/>
      <stop offset="1" stop-color="#66738b"/>
    </linearGradient>
    <linearGradient id="glass-cyan" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#b6fff4"/>
      <stop offset="1" stop-color="#26d7be"/>
    </linearGradient>
    <linearGradient id="glass-green" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#d7ffd2"/>
      <stop offset="1" stop-color="#48e482"/>
    </linearGradient>
    <linearGradient id="glass-amber" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ffe6ae"/>
      <stop offset="1" stop-color="#f39b2c"/>
    </linearGradient>
    <linearGradient id="glass-red" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ffc7ba"/>
      <stop offset="1" stop-color="#e04a3f"/>
    </linearGradient>
    <filter id="glow-cyan" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="2.2" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="glow-amber" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="2.2" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="glow-red" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="2.2" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- ================= Row 0 ================= -->
  <!-- health small -->
  <g transform="translate(0,0)">
    <ellipse cx="32" cy="53" rx="18" ry="3" fill="#0a1119" opacity="0.65"/>
    <circle cx="32" cy="30" r="20" fill="#0d1c21" opacity="0.85"/>
    <rect x="26" y="16" width="12" height="28" rx="2" fill="url(#glass-cyan)" filter="url(#glow-cyan)"/>
    <rect x="18" y="24" width="28" height="12" rx="2" fill="url(#glass-cyan)" filter="url(#glow-cyan)"/>
    <rect x="21" y="11" width="22" height="3" fill="#b3fff6" opacity="0.8"/>
  </g>

  <!-- health medium -->
  <g transform="translate(64,0)">
    <ellipse cx="32" cy="53" rx="18" ry="3" fill="#0a1119" opacity="0.65"/>
    <rect x="14" y="12" width="36" height="36" rx="6" fill="#102126" opacity="0.9"/>
    <rect x="24" y="16" width="16" height="28" rx="2" fill="url(#glass-cyan)" filter="url(#glow-cyan)"/>
    <rect x="18" y="22" width="28" height="16" rx="2" fill="url(#glass-cyan)" filter="url(#glow-cyan)"/>
    <rect x="16" y="10" width="32" height="3" fill="#b6fff4" opacity="0.85"/>
    <rect x="23" y="45" width="18" height="4" fill="#5df2d0"/>
  </g>

  <!-- health large -->
  <g transform="translate(128,0)">
    <ellipse cx="32" cy="53" rx="19" ry="3" fill="#0a1119" opacity="0.65"/>
    <rect x="12" y="12" width="40" height="38" rx="6" fill="#12251b" opacity="0.95"/>
    <rect x="22" y="15" width="20" height="32" rx="3" fill="url(#glass-green)" filter="url(#glow-cyan)"/>
    <rect x="14" y="22" width="36" height="18" rx="3" fill="url(#glass-green)" filter="url(#glow-cyan)"/>
    <rect x="20" y="8" width="24" height="4" fill="#dbffcf"/>
    <rect x="20" y="50" width="24" height="4" fill="#78f5a6"/>
  </g>

  <!-- ammo bullets -->
  <g transform="translate(192,0)">
    <ellipse cx="32" cy="53" rx="19" ry="3" fill="#0a1119" opacity="0.65"/>
    <rect x="12" y="15" width="40" height="33" rx="5" fill="url(#metal)" stroke="#f3b04a" stroke-width="2.5"/>
    <circle cx="22" cy="25" r="3.2" fill="#ffd890"/>
    <circle cx="32" cy="25" r="3.2" fill="#ffd890"/>
    <circle cx="42" cy="25" r="3.2" fill="#ffd890"/>
    <circle cx="22" cy="34" r="3.2" fill="#ffd890"/>
    <circle cx="32" cy="34" r="3.2" fill="#ffd890"/>
    <circle cx="42" cy="34" r="3.2" fill="#ffd890"/>
    <rect x="17" y="43" width="30" height="3" fill="#ffb64d" filter="url(#glow-amber)"/>
  </g>

  <!-- ammo shells -->
  <g transform="translate(256,0)">
    <ellipse cx="32" cy="53" rx="19" ry="3" fill="#0a1119" opacity="0.65"/>
    <rect x="12" y="15" width="40" height="33" rx="5" fill="#2a2430" stroke="#ff8a46" stroke-width="2.5"/>
    <rect x="18" y="19" width="10" height="24" rx="5" fill="#ffd087"/>
    <rect x="31" y="19" width="10" height="24" rx="5" fill="#ffd087"/>
    <rect x="18" y="42" width="10" height="3" fill="#8b3941"/>
    <rect x="31" y="42" width="10" height="3" fill="#8b3941"/>
    <rect x="15" y="45" width="34" height="3" fill="#ff8a46" filter="url(#glow-amber)"/>
  </g>

  <!-- ammo rockets -->
  <g transform="translate(320,0)">
    <ellipse cx="32" cy="53" rx="19" ry="3" fill="#0a1119" opacity="0.65"/>
    <rect x="14" y="14" width="36" height="35" rx="5" fill="#211f2d" stroke="#ff5f53" stroke-width="2.5"/>
    <polygon points="22,35 26,21 32,17 38,21 42,35 32,42" fill="url(#glass-red)"/>
    <rect x="26" y="41" width="12" height="4" fill="#ff5f53" filter="url(#glow-red)"/>
    <rect x="18" y="18" width="28" height="2" fill="#ffb0a5" opacity="0.75"/>
  </g>

  <!-- ammo bullets box -->
  <g transform="translate(384,0)">
    <ellipse cx="32" cy="53" rx="20" ry="3" fill="#0a1119" opacity="0.65"/>
    <rect x="9" y="14" width="46" height="36" rx="5" fill="url(#metal)" stroke="#ffd564" stroke-width="2.5"/>
    <circle cx="18" cy="24" r="3" fill="#ffd564"/>
    <circle cx="26" cy="24" r="3" fill="#ffd564"/>
    <circle cx="34" cy="24" r="3" fill="#ffd564"/>
    <circle cx="42" cy="24" r="3" fill="#ffd564"/>
    <rect x="14" y="31" width="36" height="6" fill="#2e3647"/>
    <rect x="14" y="43" width="36" height="3" fill="#ffbf3f" filter="url(#glow-amber)"/>
  </g>

  <!-- weapon shotgun -->
  <g transform="translate(448,0)">
    <ellipse cx="32" cy="53" rx="18" ry="3" fill="#0a1119" opacity="0.65"/>
    <rect x="18" y="30" width="28" height="11" rx="2" fill="#2f3544"/>
    <rect x="20" y="16" width="9" height="18" rx="2" fill="url(#chrome)"/>
    <rect x="34" y="16" width="9" height="18" rx="2" fill="url(#chrome)"/>
    <rect x="22" y="40" width="20" height="8" rx="2" fill="#7d5a3b"/>
    <rect x="18" y="15" width="28" height="3" fill="#9fd2ff" filter="url(#glow-cyan)"/>
  </g>

  <!-- ================= Row 1 ================= -->
  <!-- weapon auto rifle -->
  <g transform="translate(0,64)">
    <ellipse cx="32" cy="53" rx="18" ry="3" fill="#0a1119" opacity="0.65"/>
    <rect x="18" y="28" width="30" height="10" rx="2" fill="#3a4458"/>
    <rect x="24" y="14" width="12" height="18" rx="2" fill="#6e7f99"/>
    <rect x="24" y="37" width="10" height="13" rx="2" fill="#2c3240"/>
    <rect x="35" y="38" width="10" height="10" rx="2" fill="#7d5a3b"/>
    <rect x="19" y="16" width="24" height="3" fill="#8fd3ff" filter="url(#glow-cyan)"/>
    <rect x="16" y="50" width="30" height="3" fill="#8fd3ff" opacity="0.8"/>
  </g>

  <!-- weapon launcher -->
  <g transform="translate(64,64)">
    <ellipse cx="32" cy="53" rx="18" ry="3" fill="#0a1119" opacity="0.65"/>
    <rect x="16" y="16" width="32" height="21" rx="4" fill="#44595a"/>
    <rect x="12" y="34" width="40" height="9" rx="2" fill="#2d3a3a"/>
    <rect x="23" y="43" width="18" height="8" rx="2" fill="#7d5a3b"/>
    <rect x="18" y="18" width="28" height="4" fill="#9cffd0" filter="url(#glow-cyan)"/>
    <circle cx="32" cy="27" r="5" fill="#1a222a"/>
  </g>

  <!-- key red -->
  <g transform="translate(128,64)">
    <ellipse cx="32" cy="53" rx="16" ry="3" fill="#0a1119" opacity="0.65"/>
    <rect x="12" y="14" width="40" height="32" rx="4" fill="#1d2430" stroke="#ff4a5f" stroke-width="2.5"/>
    <rect x="21" y="22" width="22" height="14" rx="2" fill="#ffffff" opacity="0.88"/>
    <rect x="16" y="18" width="4" height="24" fill="#ff4a5f" filter="url(#glow-red)"/>
    <circle cx="45" cy="22" r="3" fill="#ff4a5f"/>
  </g>

  <!-- key blue -->
  <g transform="translate(192,64)">
    <ellipse cx="32" cy="53" rx="16" ry="3" fill="#0a1119" opacity="0.65"/>
    <rect x="12" y="14" width="40" height="32" rx="4" fill="#1d2430" stroke="#4ca9ff" stroke-width="2.5"/>
    <rect x="21" y="22" width="22" height="14" rx="2" fill="#ffffff" opacity="0.88"/>
    <rect x="16" y="18" width="4" height="24" fill="#4ca9ff" filter="url(#glow-cyan)"/>
    <circle cx="45" cy="22" r="3" fill="#4ca9ff"/>
  </g>

  <!-- key yellow -->
  <g transform="translate(256,64)">
    <ellipse cx="32" cy="53" rx="16" ry="3" fill="#0a1119" opacity="0.65"/>
    <rect x="12" y="14" width="40" height="32" rx="4" fill="#1d2430" stroke="#ffe24a" stroke-width="2.5"/>
    <rect x="21" y="22" width="22" height="14" rx="2" fill="#ffffff" opacity="0.88"/>
    <rect x="16" y="18" width="4" height="24" fill="#ffe24a" filter="url(#glow-amber)"/>
    <circle cx="45" cy="22" r="3" fill="#ffe24a"/>
  </g>

  <!-- barrel explosive -->
  <g transform="translate(320,64)">
    <ellipse cx="32" cy="54" rx="18" ry="3" fill="#0a1119" opacity="0.65"/>
    <rect x="18" y="10" width="28" height="44" rx="5" fill="#4b2320" stroke="#f26d54" stroke-width="2.5"/>
    <rect x="20" y="17" width="24" height="7" fill="#ffe7ab"/>
    <rect x="20" y="28" width="24" height="6" fill="#f2be4c"/>
    <rect x="20" y="37" width="24" height="7" fill="#f26d54" filter="url(#glow-red)"/>
    <rect x="18" y="24" width="28" height="2" fill="#2a0f12"/>
    <rect x="18" y="35" width="28" height="2" fill="#2a0f12"/>
  </g>

  <!-- projectile rocket frame 0 -->
  <g transform="translate(384,64)">
    <ellipse cx="32" cy="52" rx="14" ry="2.5" fill="#0a1119" opacity="0.55"/>
    <polygon points="22,45 32,14 42,45" fill="#ffd38a" filter="url(#glow-amber)"/>
    <rect x="28" y="34" width="8" height="15" fill="#dce7ff" filter="url(#glow-cyan)"/>
    <polygon points="29,14 35,14 32,8" fill="#ff7a5f"/>
  </g>

  <!-- projectile rocket frame 1 -->
  <g transform="translate(448,64)">
    <ellipse cx="32" cy="52" rx="14" ry="2.5" fill="#0a1119" opacity="0.55"/>
    <polygon points="21,46 32,14 43,46" fill="#ffd38a" filter="url(#glow-amber)"/>
    <rect x="28" y="33" width="8" height="16" fill="#dce7ff" filter="url(#glow-cyan)"/>
    <polygon points="29,14 35,14 32,7" fill="#7be8ff"/>
  </g>
</svg>
