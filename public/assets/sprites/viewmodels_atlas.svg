    <rect x="68" y="34" width="22" height="92" rx="6" fill="url(#gunmetal)"/>
    <rect x="58" y="114" width="84" height="24" rx="7" fill="url(#darkmetal)"/>
    <rect x="82" y="134" width="24" height="24" rx="4" fill="#2b3342"/>
