<svg xmlns="http://www.w3.org/2000/svg" width="960" height="576" viewBox="0 0 960 576">
  <defs>
    <linearGradient id="gunmetal" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#9aa8bf"/>
      <stop offset="1" stop-color="#4a556b"/>
    </linearGradient>
    <linearGradient id="darkmetal" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#5a6578"/>
      <stop offset="1" stop-color="#2a3241"/>
    </linearGradient>
    <linearGradient id="olive" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#6d7f5d"/>
      <stop offset="1" stop-color="#364032"/>
    </linearGradient>
    <linearGradient id="wood" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#9b7048"/>
      <stop offset="1" stop-color="#5c3d28"/>
    </linearGradient>
    <filter id="glow-cyan" x="-70%" y="-70%" width="240%" height="240%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="glow-amber" x="-70%" y="-70%" width="240%" height="240%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Row 0: READY -->
  <g transform="translate(0,0)">
    <!-- baton ready -->
    <rect x="78" y="42" width="36" height="118" rx="10" fill="url(#darkmetal)"/>
    <rect x="84" y="50" width="24" height="18" rx="4" fill="#a7d9ff" filter="url(#glow-cyan)"/>
    <rect x="72" y="130" width="48" height="40" rx="8" fill="url(#wood)"/>
    <rect x="60" y="170" width="26" height="18" rx="6" fill="#2a2020"/>
    <rect x="106" y="170" width="26" height="18" rx="6" fill="#2a2020"/>
  </g>

  <g transform="translate(192,0)">
    <!-- pistol ready -->
    <rect x="62" y="62" width="68" height="26" rx="6" fill="url(#gunmetal)"/>
    <rect x="58" y="84" width="76" height="34" rx="8" fill="url(#darkmetal)"/>
    <rect x="76" y="114" width="40" height="62" rx="9" fill="url(#wood)"/>
    <rect x="70" y="70" width="52" height="6" fill="#9fe2ff" filter="url(#glow-cyan)"/>
    <rect x="62" y="168" width="28" height="20" rx="7" fill="#2a2020"/>
    <rect x="102" y="168" width="28" height="20" rx="7" fill="#2a2020"/>
  </g>

  <g transform="translate(384,0)">
    <!-- shotgun ready -->
    <rect x="64" y="34" width="22" height="96" rx="8" fill="url(#gunmetal)"/>
    <rect x="104" y="34" width="22" height="96" rx="8" fill="url(#gunmetal)"/>
    <rect x="54" y="120" width="82" height="28" rx="8" fill="url(#darkmetal)"/>
    <rect x="68" y="144" width="56" height="36" rx="8" fill="url(#wood)"/>
    <rect x="66" y="42" width="58" height="5" fill="#9fe2ff" filter="url(#glow-cyan)"/>
    <rect x="54" y="170" width="30" height="18" rx="6" fill="#2a2020"/>
    <rect x="106" y="170" width="30" height="18" rx="6" fill="#2a2020"/>
  </g>

  <g transform="translate(576,0)">
    <!-- auto rifle ready -->
    <rect x="68" y="40" width="22" height="92" rx="6" fill="url(#gunmetal)"/>
    <rect x="58" y="120" width="84" height="24" rx="7" fill="url(#darkmetal)"/>
    <rect x="82" y="140" width="24" height="24" rx="4" fill="#2b3342"/>
    <rect x="74" y="156" width="42" height="30" rx="8" fill="url(#wood)"/>
    <rect x="70" y="48" width="46" height="5" fill="#9fe2ff" filter="url(#glow-cyan)"/>
    <rect x="56" y="170" width="30" height="18" rx="6" fill="#2a2020"/>
    <rect x="106" y="170" width="30" height="18" rx="6" fill="#2a2020"/>
  </g>

  <g transform="translate(768,0)">
    <!-- launcher ready -->
    <rect x="54" y="46" width="84" height="56" rx="14" fill="url(#olive)"/>
    <circle cx="96" cy="70" r="16" fill="#1a2020"/>
    <rect x="66" y="96" width="60" height="32" rx="8" fill="url(#darkmetal)"/>
    <rect x="76" y="124" width="40" height="58" rx="10" fill="url(#wood)"/>
    <rect x="60" y="52" width="72" height="6" fill="#a3ffd8" filter="url(#glow-cyan)"/>
    <rect x="58" y="170" width="30" height="18" rx="6" fill="#2a2020"/>
    <rect x="104" y="170" width="30" height="18" rx="6" fill="#2a2020"/>
  </g>

  <!-- Row 1: FIRE -->
  <g transform="translate(0,192)">
    <!-- baton fire -->
    <rect x="78" y="34" width="36" height="118" rx="10" fill="url(#darkmetal)"/>
    <rect x="84" y="42" width="24" height="18" rx="4" fill="#c2ebff" filter="url(#glow-cyan)"/>
    <rect x="72" y="122" width="48" height="40" rx="8" fill="url(#wood)"/>
    <ellipse cx="96" cy="24" rx="20" ry="9" fill="#ffd39a" filter="url(#glow-amber)"/>
    <rect x="60" y="170" width="26" height="18" rx="6" fill="#2a2020"/>
    <rect x="106" y="170" width="26" height="18" rx="6" fill="#2a2020"/>
  </g>

  <g transform="translate(192,192)">
