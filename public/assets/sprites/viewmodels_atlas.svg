    <rect x="80" y="58" width="34" height="114" rx="10" fill="#3c4557"/>
    <rect x="74" y="136" width="46" height="40" rx="8" fill="#70513a"/>
    <rect x="85" y="65" width="22" height="8" rx="3" fill="#8cb9d8"/>
    <rect x="60" y="170" width="26" height="18" rx="6" fill="#2a2020"/>
    <rect x="106" y="170" width="26" height="18" rx="6" fill="#2a2020"/>
  </g>

  <g transform="translate(192,384)">
