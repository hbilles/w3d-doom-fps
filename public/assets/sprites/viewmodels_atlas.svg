    <rect x="58" y="78" width="76" height="34" rx="8" fill="url(#darkmetal)"/>
    <rect x="76" y="108" width="40" height="62" rx="9" fill="url(#wood)"/>
    <rect x="70" y="64" width="52" height="6" fill="#b8edff" filter="url(#glow-cyan)"/>
    <polygon points="96,34 84,56 108,56" fill="#ffe2b2" filter="url(#glow-amber)"/>
    <rect x="62" y="168" width="28" height="20" rx="7" fill="#2a2020"/>
    <rect x="102" y="168" width="28" height="20" rx="7" fill="#2a2020"/>
  </g>

  <g transform="translate(384,192)">
