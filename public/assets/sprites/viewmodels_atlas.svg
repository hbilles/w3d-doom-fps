    <rect x="64" y="28" width="22" height="96" rx="8" fill="url(#gunmetal)"/>
    <rect x="104" y="28" width="22" height="96" rx="8" fill="url(#gunmetal)"/>
    <rect x="54" y="114" width="82" height="28" rx="8" fill="url(#darkmetal)"/>
    <rect x="68" y="138" width="56" height="36" rx="8" fill="url(#wood)"/>
    <ellipse cx="75" cy="24" rx="15" ry="9" fill="#ffe2b2" filter="url(#glow-amber)"/>
    <ellipse cx="115" cy="24" rx="15" ry="9" fill="#ffe2b2" filter="url(#glow-amber)"/>
    <rect x="54" y="170" width="30" height="18" rx="6" fill="#2a2020"/>
    <rect x="106" y="170" width="30" height="18" rx="6" fill="#2a2020"/>
  </g>

  <g transform="translate(576,192)">
