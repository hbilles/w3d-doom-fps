    <rect x="64" y="78" width="64" height="22" rx="6" fill="#627188"/>
    <rect x="60" y="96" width="72" height="30" rx="8" fill="#3b4557"/>
    <rect x="78" y="121" width="36" height="55" rx="9" fill="#72513b"/>
    <rect x="70" y="84" width="48" height="4" fill="#7ea3be"/>
    <rect x="62" y="168" width="28" height="20" rx="7" fill="#2a2020"/>
    <rect x="102" y="168" width="28" height="20" rx="7" fill="#2a2020"/>
  </g>

  <g transform="translate(384,384)">
    <!-- shotgun recovery -->
    <rect x="66" y="48" width="20" height="94" rx="8" fill="#5b677d"/>
    <rect x="104" y="48" width="20" height="94" rx="8" fill="#5b677d"/>
    <rect x="56" y="132" width="78" height="24" rx="8" fill="#394456"/>
    <rect x="70" y="152" width="50" height="32" rx="8" fill="#70513b"/>
    <rect x="68" y="56" width="54" height="4" fill="#83a8c2"/>
    <rect x="54" y="170" width="30" height="18" rx="6" fill="#2a2020"/>
    <rect x="106" y="170" width="30" height="18" rx="6" fill="#2a2020"/>
  </g>

  <g transform="translate(576,384)">
    <!-- auto rifle recovery -->
    <rect x="70" y="54" width="20" height="88" rx="6" fill="#5c677d"/>
    <rect x="60" y="128" width="80" height="22" rx="7" fill="#394456"/>
    <rect x="82" y="146" width="22" height="20" rx="4" fill="#263141"/>
    <rect x="76" y="160" width="38" height="26" rx="8" fill="#70513b"/>
    <rect x="72" y="60" width="42" height="4" fill="#83a8c2"/>
    <rect x="56" y="170" width="30" height="18" rx="6" fill="#2a2020"/>
    <rect x="106" y="170" width="30" height="18" rx="6" fill="#2a2020"/>
  </g>

  <g transform="translate(768,384)">
    <!-- launcher recovery -->
    <rect x="56" y="58" width="80" height="52" rx="14" fill="#4f5e48"/>
    <circle cx="96" cy="80" r="14" fill="#151d1d"/>
    <rect x="68" y="104" width="56" height="28" rx="8" fill="#364153"/>
    <rect x="78" y="128" width="36" height="54" rx="10" fill="#6f503b"/>
    <rect x="62" y="64" width="68" height="5" fill="#88cdb0"/>
    <rect x="58" y="170" width="30" height="18" rx="6" fill="#2a2020"/>
    <rect x="104" y="170" width="30" height="18" rx="6" fill="#2a2020"/>
